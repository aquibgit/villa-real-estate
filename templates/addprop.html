{% load static %}

	{% include 'header.html' %}	
<link rel="stylesheet" href="{% static 'assets/css/register.css' %}">

<div class="register-page">
    <div class="register-header">
        <h1>ADD PROPERTY</h1>
    </div>

    <div class="register-container">
        <form class="register-form" action="add_prop" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group file-upload-group">
                <label for="photo" class="file-upload-label">
                    <span id="file-name">Upload Property Photo </span>
                    <input id="photo" name="property_photo" type="file" accept="image/*" class="file-input">
                </label>
            </div>

            <div class="form-group">
                <input  name="property_category" type="text" placeholder="category" required>
            </div>
            
            <div class="form-group">
                <input  name="property_name" type="text" placeholder="name" required>
            </div>

            <div class="form-group">
                <input  name="property_location" type="text" placeholder="location" required>
            </div>

            <div class="form-group">
                <input  name="property_budget" type="text" placeholder="budget" required>
            </div>

            <div class="form-group">
                <input  name="property_bedroom" type="text" placeholder="bedrooms" required>
            </div>

            <div class="form-group">
                <input  name="property_bathroom" type="text" placeholder="bathrooms" required>
            </div>

            <div class="form-group">
                <input  name="property_area" type="text" placeholder="area" required>
            </div>

            <div class="form-group">
                <input  name="property_floor" type="text" placeholder="floor" required>
            </div>

            <div class="form-group">
                <input  name="property_parking" type="text" placeholder="parking" required>
            </div>

            <div class="register-actions">
                <button id="submitbttn" type="submit" class="register-btn">
                    ADD PROPERTY
                </button>
            </div>
        </form>				
    </div>
</div>

{% include 'footer.html' %}
