{% load static %}

	{% include 'header.html' %}
<center><div class="text">
	<h1>REQUESTED BUILDERS</h1>
	<!-- <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Mauris sed nisl pellentesque, faucibus libero eu, gravida quam. </p> -->
</div> </center>
<div class="container mt-4">
  <div class="row">
    {% for i in builders %}
    <div class="col-lg-4 col-md-6 mb-4">
      <div class="card shadow-sm h-100">
        <!-- Doctor Photo -->
        <img src="../media/{{ i.buildphoto }}" class="card-img-top" alt="not found" style="height:220px; object-fit:cover;">
        
        <div class="card-body">
          <h5 class="card-title">{{ i.buildname }}</h5>
          <p class="card-text">
            <strong>Email:</strong> {{ i.buildemail }} <br>
            <strong>Phone:</strong> {{ i.buildphone }} <br>
            <strong>Password:</strong> {{ i.buildpassword }} <br>
            
          </p>
        </div>
        
        <div class="card-footer d-flex justify-content-between">
         
          
          <!-- Update -->
          <a href="{% url 'Delete_approved_builder' id=i.id %}" class="btn btn-danger btn-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
              class="bi bi-pencil-square" viewBox="0 0 16 16">
              <path
                d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z" />
              <path fill-rule="evenodd"
                d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z" />
            </svg>
          </a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>


    {% include 'footer.html' %}
