{% load static %}

	{% include 'header.html' %}	
<link rel="stylesheet" href="{% static 'assets/css/register.css' %}">

<div class="register-page">
    <div class="register-header">
        <h1>EDIT BOOKING</h1>
    </div>

    <div class="register-container">
        <form class="register-form" action="edit_bookings/{{ prop.id }}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}


            <div class="form-group">
                <input  name="name" type="text" placeholder="{{ prop.name}}" required>
            </div>

            <div class="form-group">
                <input  name="email" type="text" placeholder="{{ prop.email}}" required>
            </div>

            <div class="form-group">
                <input  name="phone" type="text" placeholder="{{ prop.phone}}" required>
            </div>
            
            <div class="form-group">
                <input  name="property_name" type="text" placeholder="{{ prop.property_name }}" required>
            </div>

            <div class="form-group">
                <input  name="property_location" type="text" placeholder="{{ prop.property_location }}" required>
            </div>

            <div class="form-group">
                <input  name="property_budget" type="text" placeholder="{{ prop.property_budget }}" required>
            </div>

            

            <div class="register-actions">
                <button id="submitbttn" type="submit" class="register-btn">
                    EDIT
                </button>
            </div>
        </form>				
    </div>
</div>
{% include 'footer.html' %}
